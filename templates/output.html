<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <div class="card shadow p-4">

        <h1 class="text-center">
            📈 Stock Prediction Result
        </h1>

        <hr>

        <h4>
            Stock Name:
            {{ stock_name }}
        </h4>

        <h4>
            Prediction Days:
            {{ days }}
        </h4>

        <h4>
            RMSE:
            {{ rmse }}
        </h4>

        <hr>

        <h3>
            Future Prediction Graph
        </h3>

        <img
            src="{{ url_for('static', filename='graph.png') }}"
            class="img-fluid"
            alt="Prediction Graph">

        <hr>

        <h3>
            Predicted Values
        </h3>

        <table class="table table-bordered table-striped">

            <thead>
                <tr>
                    <th>Day</th>
                    <th>Predicted Price</th>
                </tr>
            </thead>

            <tbody>

            {% for row in table_data %}

                <tr>
                    <td>{{ row.day }}</td>
                    <td>{{ row.price }}</td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

        <hr>

        <h3>
            Actual vs Predicted Graph
        </h3>

        <img
            src="{{ url_for('static', filename='actual_vs_predicted.png') }}"
            class="img-fluid"
            alt="Actual vs Predicted">

        <br><br>

        <a href="/input" class="btn btn-primary">
            Predict Again
        </a>

    </div>

</div>

</body>
</html>
